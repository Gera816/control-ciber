<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Entrada - Ciber</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor">
        <h1>Registrar Nueva Entrada</h1>
        
        <form id="formulario-entrada">
            <label for="nombre">Nombre del Usuario:</label>
            <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>

            <label for="sala">Selecciona la Sala:</label>
            <select id="sala" required>
                <option value="Auditorio">Auditorio</option>
                <option value="Ludoteca">Ludoteca</option>
                <option value="Consulta General">Consulta General</option>
                <option value="Sala Infantil">Sala Infantil</option>
                <option value="Sala Digital">Sala Digital</option>
            </select>

            <div id="contenedor-pc" style="display: none;">
                <label for="computadora">Selecciona la PC (1-30):</label>
                <select id="computadora">
                    </select>
            </div>

            <button type="submit">Registrar Entrada</button>
        </form>

        <br>
        <a href="salidas.html">Ir a la ventana de Salidas ➡️</a>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
