<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Entrada - Ciber</title>
    <link rel="stylesheet" href="style.css">
    </head>
<body>

    <div class="contenedor">
        <h1>Registrar Nueva Entrada</h1>
        
        <form id="formulario-entrada">
            <label for="nombre">Nombre del Usuario:</label>
            <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>

            <label for="sala">Selecciona la Sala:</label>
            <select id="sala" required>
                <option value="Sala 1">Sala 1</option>
                <option value="Sala 2">Sala 2</option>
                <option value="Sala 3">Sala 3</option>
                <option value="Sala 4">Sala 4</option>
                <option value="Sala 5">Sala 5</option>
            </select>

            <label for="computadora">Selecciona la PC:</label>
            <select id="computadora" required>
                <option value="PC 1">PC 1</option>
                <option value="PC 2">PC 2</option>
                <option value="PC 3">PC 3</option>
                <option value="PC 4">PC 4</option>
                <option value="PC 5">PC 5</option>
                <option value="PC 6">PC 6</option>
            </select>

            <button type="submit">Registrar Entrada</button>
        </form>

        <br>
        <a href="salidas.html">Ir a la ventana de Salidas ➡️</a>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
